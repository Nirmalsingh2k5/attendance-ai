services:
  - type: web
    name: ai-attendance-system
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 240"
    healthCheckPath: /api/system/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ATTENDANCE_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: MAX_REQUEST_SIZE_MB
        value: "8"
      - key: MAX_UPLOAD_PHOTOS_PER_REQUEST
        value: "12"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GUNICORN_THREADS
        value: "1"
      - key: CLASSROOM_MAX_IMAGE_DIMENSION
        value: "640"
      - key: UPLOAD_CLASSROOM_DETECTOR_BACKEND
        value: "opencv"
      - key: REFERENCE_DETECTOR_BACKEND
        value: "opencv"
      - key: FALLBACK_DETECTOR_BACKEND
        value: "opencv"
      - key: GUNICORN_TIMEOUT
        value: "240"
      - key: ATTENDANCE_STORAGE_ROOT
        value: .render-data
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
